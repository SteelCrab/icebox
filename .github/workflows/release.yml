# Release automation for Icebox
#
# Trigger: push a version tag (e.g. `git tag -a v0.2.1 -m "v0.2.1" && git push origin v0.2.1`)
#
# What it does:
#   1. Build release binaries for 7 targets (Linux + macOS) in parallel via matrix
#   2. Upload each binary as a tar.gz to the GitHub Release
#   3. Regenerate SteelCrab/homebrew-tap Formula/icebox.rb (macOS arm64 + x86_64)
#
# Requirements:
#   - Repository secret `TAP_GITHUB_TOKEN`: a fine-grained PAT with
#     `Contents: Read and write` on SteelCrab/homebrew-tap

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

          # Linux (glibc)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm

          # Linux (musl, static)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm

          # Linux (32-bit ARM)
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: icebox
          target: ${{ matrix.target }}
          archive: icebox-$target
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS binaries from release
        run: |
          mkdir -p dist
          gh release download "${{ steps.version.outputs.TAG }}" \
            --repo "${{ github.repository }}" \
            --pattern "icebox-aarch64-apple-darwin.tar.gz" \
            --pattern "icebox-x86_64-apple-darwin.tar.gz" \
            --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        id: sha
        run: |
          ARM64_SHA=$(sha256sum dist/icebox-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          X86_64_SHA=$(sha256sum dist/icebox-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          echo "ARM64_SHA=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "X86_64_SHA=${X86_64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: SteelCrab/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Regenerate formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"
          ARM64_SHA="${{ steps.sha.outputs.ARM64_SHA }}"
          X86_64_SHA="${{ steps.sha.outputs.X86_64_SHA }}"

          cat > homebrew-tap/Formula/icebox.rb <<FORMULA
          # Homebrew formula for Icebox — Rust TUI Kanban Board with AI Sidebar
          #
          # Install:  brew tap SteelCrab/tap && brew install icebox
          # Upgrade:  brew upgrade icebox
          #
          # Auto-generated by GitHub Actions in SteelCrab/icebox on every v* tag push.

          class Icebox < Formula
            desc "Rust TUI Kanban Board with AI Sidebar"
            homepage "https://github.com/SteelCrab/icebox"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/SteelCrab/icebox/releases/download/${TAG}/icebox-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/SteelCrab/icebox/releases/download/${TAG}/icebox-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_SHA}"
              end
            end

            def install
              bin.install "icebox"
            end

            test do
              assert_match "icebox", shell_output("#{bin}/icebox help")
            end
          end
          FORMULA

      - name: Push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/icebox.rb
          if git diff --cached --quiet; then
            echo "No changes to formula"
          else
            git commit -m "Update icebox to ${{ steps.version.outputs.TAG }}"
            git push
          fi
